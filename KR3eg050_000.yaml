body:
  text: 羊毛溫證論伏邪窮源論夫天地之氣萬物之源也伏邪之氣疾病之源也惟醫以意格以理而明之氣陽也神為之主輕清象天無形而能生物資始之根也血陰也氣為之主重濁象地有形而能乘載資生之根也一動一靜互為之根溯萬物之初運至氣至並歲干氣化而太過不及則有偏勝之災夫病生之始外因內因並不內外因而邪乘口鼻則有伏藏之害氣勝者和氣不勝者病其伏藏之邪溫毒也蓋非四時六氣之溫邪乃山澤鬱蒸之毒名日厲氣即內經所謂苛毒是也如評熱論間有溫病者汗出輒復熱而脈躁疾狂言不能食病名為何對曰病名陰陽交交者死也此論四時六氣之溫也又刺熱篇肝熱病者小便先黃腹痛多臥身熱心熱病者先不樂數日乃熱脾熱病者先頭重頰痛顏青欲嘔身熱肺熱病者先淅寒厥起毫毛惡風寒舌上黃身熱腎熱病者先腰酸苦渴飲身熱此論情欲內蒸之熱也欲知五臟之熱可望而知之肝熱左頰先赤肺熱右頰先赤脾熱鼻赤腎熱頤赤心熱顏赤病雖未發見赤色者治之名曰治未病但伏邪之毒郁久而發上升下降從胃土關隘之所毒蒸變化化生羊毛至於病及內以達外必然光見於色要知毒火梟張早為攻伐免致貽禍再能未病而窮之其醫更備矣此病非四時六氣之邪又非情欲之賊火乃伏邪毒火之為害每致人悶絶可不慎歟但索本窮源難以透達微撮其耍以備一參耳溫病論夫溫熱之為病醫知之矣此非六氣四時之溫乃厲氣伏藏之溫也且述自岐黃淵源正脈紀歲數於派分最廣治各不同何也歲氣使然地勢使然但能揆度病情審察病機靈活者得其巧固滯者守其法知不偏而偏者泥於體似偏而不偏者合乎用經云法於陰陽和於術數夫法也者無限之體和也者無限之用所以天覆地載人稟五行人在氣交之中美惡之氣無不感耳然而本氣貫乎天運行不息氣之正也氣和者長養萬物氣偏者損傷萬物在人則有強弱氣則有盈虛其受氣清者生神受氣濁者生病是以老少強弱偶有一息之虛受其厲氣鬱於中土釀久而發流蕩伏邪毒火所由來也夫胃為十二經之海十二經都會於胄胃氣敷布於十二經惟虛者注之非感而即發伏久乃發也其作仍歸於胃達於三焦縱現各腑各臟之形以胄氣為主設聚於胃不能攻逐毒火仍陷於本注之所終難釋矣故毒火攻下之宜早或間時邪形證答曰時邪發動人身運行之氣乃為之陰陽氣不伸反為之寒陰氣閉塞反為之熱其初病也舉動如常忽寒忽熱既而面色青白頭眩難支腰背脹痛胸悶氣阻四肢麻木聲音低小煩躁不寧口渴舌赤苔白或黃或灰黑或砂白皆有裂紋紅紫點布或舌中無苔或舌如胭脂唇若塗朱嘔吐乾噦人皆昏沉譫言狂亂或出羊毛斑疹或癰疔腮腫或頭面浮腫或咽痛等證難以盡舉脈象右大於左六部不調或沈伏或弦數或洪大或堅實無一定之形皆入稟受之別也亦由邪伏之輕重也先見寒熱者少陽之初氣也少陽為微陽本為樞時邪初泄病者原不知覺既而聚胄毒火梟漲故有此象所謂時邪病形者是也夫時邪者伏邪之化也伏邪化形形似羊毛蓋非六氣四時之溫明矣羊毛論羊毛之為病也始覺微寒發熱或憎寒或壯熱或發疹塊面色微青唇紅而脹舌有薄苔紅點裂紋胸中滯塞身脹痠麻手足不利前心後心或有斑點或無斑點及病至面色青板身重不仁皮膚紫脹脈不至則無救矣伏讀御纂醫宗金鑑內載羊毛疔證一條初起時身發寒熱狀類傷寒但前心後心有紅點又如疹形視其斑點色紫黑者為老色淡紅者為嫩宜服蟾酥丸汗之毒勢不盡憎寒壯熱仍作者宜服五味消毒飲汗之如發熱口渴便閉脈沉實者邪在裡也宜黃連解毒湯加生大黃一錢五分蔥頭五個清之治法先將紫黑斑點用衣針挑出如羊毛狀前心後心共挑數處用黑豆蕎麥研紛塗之即時汗出而愈一法用明雄黃末二錢青布包扎蘸熱燒酒於前心擦之自外圈入內其毛即奔至後心再於後心擦之其羊吒懼找出於布上忌茶水一日竊思疔有羊毛與近日羊平時證大略相同即以治疔之理而會迎其意治此證亦可也且人身災眚自古迄今備載病目有增無損有書載而未見有病見而無書者誠可悼嘆所以一時之病證一方之疾厄古人筆之於書以備後人參考知某書有此等病也大業醫者智圓行方心小膽大臨證即師療證即法今時邪由毒氣土藏鬱蒸金化忽有羊毛類似蠶絲其毛倒生膚里膜外針刺皮膚絶無點血剔出羊毛長者七人寸短者二三寸剔未盡者再以蕎麥麵用陰陽水和團自胸前圈滾至腹背心圈滾至腰滾處約百餘轉麵糰中毛多遍身全滾皆有投以加減雙解散至肺氣舒暢血脈流通大汁如雨或發疹塊而愈蓋此證獲效於雙解之方治法即仿羊毛疔證五味消毒飲黃連解毒湯加大黃蔥頭之意要亦內經金鬱泄之上郁奪之之旨清太陰通陽明達三焦為無上法門非重劑硝黃烏能勝其病哉伏邪毒重者述投大劑雙解膏黃用一二十兩亦不為過但稍有疑畏之心莫能解釋其疾或有誤治者以寒熱作瘧治胸悶氣脹作停食受寒治或以溫中燥濕治或以達原破氣治病日加增昏悶而死至於不能醫治者病來急速氣阻神昏面色青慘站立不起肢冷脈無故不治也所謂不治者毒火與元氣勢不兩立井於上焦陽氣不行肺胄不通即經云諸氣膹郁皆屬於肺此為悶絶之由其可治者惟臨證之時不可不細心耳辨惑論或問卯酉之歲陽明司天燥氣主之又乙庚化金金生辛辛生肺肺生皮毛羊毛一證自然歲運氣化乃非卯酉之歲亦見其證非乙庚化象亦見其證有一方見羊毛證有一方不見羊毛證再者毛生皮內名曰羊毛拔出形似蠶絲何以不名蠶絲而名羊毛至藥用峻重涼攻何以不傷氣血病愈易於如常識羊毛證候何法以別之亦有服輕藥而獲效者何不盡用輕藥而治之答曰歲運氣化可知客氣流行有風氣之變化否且在地有高下天有陰晴皆統乎一氣萬物皆備於土如天時晴久其氣伏之轉深故各方病見之有異然則天運之妙其可知耶其不可知耶其運氣之旨譬如走盤之珠無一定之時也但氣之變化固不常在而物由之而入應之難以執一論也至毛生皮內如合麴然因氣之所感伏藏於土金氣蓄之火氣蒸之故從金化素間云金位之下火氣乘之考之周禮夏官注云羊屬南方火說文羊祥也易說卦兌為羊其質好剛滷曲禮羊曰柔毛月令注羊火畜也其病伏藏毒火謂之羊非無因也考之說文蠶任絲也蠶吐有數丈之絲羊生無數尺之毛是羊毛耶是蠶絲耶果是羊毛乎非也伏藏毒火取其名耳且身中伏邪即毒火也火可燎原火可炎燒氣血其毒火浮於肺胃三焦攻之速者毒火即解其氣血未曾損傷故病退即如常人至於識證易於明顯毒火輕者自然涼藥輕攻毒火重者斷不可以輕藥其毒火最速毒重藥輕則腐腸爛胄及至受害則悔無及矣故余另有規則治法備方老少男女貧富不同治溫邪之為病因病以訂方因氣以知病實因人以治也何以言之人類不齊有老少焉有男女焉有貧富焉推而言之有形樂志苦有志樂形苦有形志皆苦有形志俱樂又如是種種各別其受毒氣則一也大抵老者氣血就衰形如枯樹不可摧殘治宜早解其毒於攻之中量其毒注輕重也幼者氣血未定腸胃脆薄不任毒發急宜早攻當思一兩歲時作七十歲觀一周以內作八九十歲觀自然百無一失婦人之病與男子無異所異者胎前産後經期月候耳至於分者勞力飲食自倍無酒色可思無機關可用故腠理常實而有病拖延當以急攻為主免致毒傷內臟至於富者或終身逸樂不免纍於酒色或過於勞心食少事煩其腠理恆虛而有病即醫亦宜量其攻伐除邪即安正也至老少用藥攻伐十之四五不可太過至於婦人胎産病羊毛溫證並婦女行經等證另有分治此其大略也若夫神而明之變而通之又在會心者自用焉耳臨證規則病患難知有規則而能知道為化象法為至理萬法歸一在於得其要領人非生而知之必有資於規則務須瞻與識俱心隨理運臨證推尋詳明果決若識見不真先迷嚮往之路膽力不壯同歸廢弛之塗終不能遇病而驅之也蓋溫邪見證有發熱惡寒有微熟惡寒有無熱惡寒有發熱不惡寒其溫邪出於陰陽臟腑而別之也陰為臟陽為腑其脈亦有陰陽脈之浮洪數長實五陽也脈之沈遲微弦澀五陰也至內伏之邪以右手寸口為主浮為在表沉為在裡數為在腑遲為在臟陽病陰脈陰病陽脈死生判斷不盡然也惟脈有神者准也欲知病愈未愈脈大為病進脈緩為病退申明溫邪出三陽病治溫邪自里達表邪出少陽則微作寒熱口苦作噦舌微現白苔苔中有紋夾雜紅點頭忽眩暈胸脅脹悶方用荊防敗毒散合溫證解毒散治之繼以加減雙解散溫邪出陽明發熱不惡寒口渴唇燥舌苔厚白或現黃苔皆有紫點苔見裂紋頭重作痛胸脹身酸煩躁嘔吐面色紅亮惡人與火方用加滅雙解散主之次用白虎湯溫邪出太陽惡寒發熱頭痛脊強項痛拘束或嘔或瀉口淡不渴舌有滑苔或黃或白皆有紅點裂紋面色灰滯便數或遺精方用荊防敗毒散加滑石一二兩次用加減雙解散以上溫邪出三陽依方調治至於病有變異宜照備方選用申明溫熱攻三陰病治溫熱攻太陰煩躁忽熱肢冷身倦氣急吐蛔腹滿泄瀉口渴不飲舌如砂壘神昏語錯脈沉數者生浮軟者不治溫熱攻少陰渴躁狂妄壯熱忽寒咽痛胸脹忽阻忽喘自利不食麵赤脹亮脈數大不急者生成急或散者不治溫熱攻厥陰面色灰滯舌強唇紫苔黑而干柚搐悶亂厄逆連聲微熱肢冷腹脹囊縮或囊腫而破或胄口作痛痛至少腹脹硬加石脈弦數不強者生或如新張弓弦或細而短者俱不治以上溫邪攻三陰難救之病宜早服加減雙解散黃連解毒湯再依病證增減用藥至病有變異宜照備方選用羊毛溫證規則半毛見證有輕重之分宜詳細申明但此病之來人皆不覺而為醫者未曾多見亦或見者未必深識何況於病家為得信其為羊毛證乎夫溫證羊毛伏郁毒火有注於厥陰少陽者有注於少陰太陽者有注於人陰陽明者此為雙注證毒邪極重者也有注於少陽經者有注於陽明經者有注於太陽經者此為單注證毒火少輕也申明羊毛雙注證治厥陰少陽形證寒熱似瘧面青色滯唇燥乾嘔舌苔白滑有紫點裂紋周身振動腹內如梗兩條胸悶氣急忽毒大沖動人事昏亂兩目倣徨驚悸直視角弓反張如畏刀鋸加見鬼神治法外除羊毛內服加滅雙解散增雄鼠糞七枚次用五黃丹珠黃散紫雪金丹並犀角羚羊地丁蒲公英銀花雄黃解毒等藥少陰太陽形證時發寒熱而色青赤唇燥舌破苔黃點紫咽喉不利周身板束四肢麻木骨痛如碎頭如斧劈或嘔或瀉胸悶氣脹晝夜不安小便閉塞煩躁不寧治法外除羊毛內服加減雙解散增羌活兼服五黃丹次用加味涼膈散黃連解毒湯並服金汁人中黃牛黃銀花蒲公英解毒等藥太陰陽明形證壯熱微寒四肢厥冷麵色青灰紫脹唇掀腫裂舌本紫赤苔如粉白有刺兼有紅點裂紋渴欲多飲飲又嘔吐牙床出血胸脹腹痛狂躁氣急治法外除羊毛內服加減雙解散兼五黃丹繼服加減大柴胡湯並服西瓜水犀角羚羊人中黃銀花蒲公英地丁雄黃牛黃解毒等藥申明羊毛單注證治少陽形證寒熱如瘧面色微青神倦身重頭眩目澀口苦喜噦舌有薄苔或黃或白皆有點紋胸悶心煩治法內服荊防販毒散兼服五黃丹外除羊毛次服五味消毒飲並加減雙解散增雄黃少許和服陽明形證不惡寒忽發熱唇乾微渴面青微紅舌如積粉有細紋紅點胸悶身倦頭暈作煩不能安臥治法內服升麻葛根湯兼服五黃丹外除羊毛次服加減雙解散白虎湯太陽形證寒熱身重面青微赤頭痛脊強或嘔或瀉胸悶氣脹舌本紫色苔見白滑有細點裂紋唇乾咽燥口淡而黏渴而不飲小便赤澀或道精或淋濁治法內服荊防販毒散兼服五黃丹外除羊毛次服加減雙解散豬苓湯以上雙注單注羊毛溫證用藥調治使病者汗出徹舌浮白苔點紋皆退或漏身作癢或發疹塊以熱退毛除為愈又雙注單注形證不必拘於日期惟辨臟腑毒火之輕重也至於治法俱以太陰肺陽明胃少陽三焦為主其最要者陽明胄腑胄為水穀之海五臟之源十二經總會之地當於此處逐毒不可忽略實者宜用加減雙解散虛者宜用新制蘭膏湯並服五黃丹徜毒重本虛亦宜加減雙解散不可太過至四損不可正治由於大勞大欲及大病久病氣血兩虧陰陽並竭名為四損又病羊毛溫邪最難調治宜臨證時細加詳察是氣虧是血虧是元陽虧是元陰虧必至審定然後施治得當為良羊毛溫邪疑似辨羊毛溫邪亦有疑似難明須辨質之虛實毒之輕重毛之有無有似虛寒而伏大熱有似雜病而治不能痊者此疑似之證貽級匪輕然而虛者宜輕逐毒火資者大可涼攻毒之輕者宜緩攻毒之重者宜急攻羊毛有無用蕎麥麵團圈擦醫皆能知之也至於虛證似實實證似虛青輕似重毒重似輕外無疹點內有羊毛類似雜證而有羊毛類似虛寒而伏大熱最難詳辨若不細心體認辨出真情何能破其隱蔽療其病患耶羊毛溫邪虛證似實如陽氣素虧氣短少息陰血素虧面色痿黃至毒火伏藏於內神反精壯麵反光亮初病微覺寒熱胸反不脹擦有羊毛舌本赤色浮有白苔現有點紋脈象虛洪或見細數渴而不飲煩而不躁者是也縱宜宣伐於攻藥之中兼以養氣和血為主羊毛溫邪實證似虛精神素健飲食倍常毒伏於內神反倦怠面反青白心慌頭眩內燒無力時忽發麻用蕎麥麵團圈擦身有羊毛舌本紫色現有厚苔或黃或白紫點裂紋脈象數實或浮軟沈堅喜飲不多昏沈困睡者是也急宜宣伐於攻藥之中重用膏黃芒硝為主並用珠黃散紫雪金丹羊毛溫邪毒輕似重毒火發作面色青紅壯熱煩躁無汁口渴胸悶不寬舌苔薄黃點紅紋細脈象洪數攻伐解毒之藥利於輕用羊毛溫邪毒重似輕毒火發作舉動如常面色青滯微熱惡寒口淡嘔痰噁心胸悶舌苔灰白紫點裂紋脈象沈實攻伐解毒之藥利於峻重羊毛溫邪毒火發動胸悶惡寒皮膚忽木前後心無點周身無疹或神昏氣悶或潮熱不止或飲食減少或嘔酸痰或不發熱俱用蕎麥麵團圈擦前心後心如有毛者宜服解毒攻伐藥除之羊毛溫邪有大熱似寒四肢厥冷身重不仁面青浮腫目瞪神呆唇淡而皺舌苔灰白紫色細點嘔吐痰沫痰有辛味胸悶神昏早覺蘇醒午後如死脈象沈微獨右尺見促脈余初臨此證類似虛寒懨懨一息疑為必死細推證象早覺蘇醒右尺脈促舌苔灰白有細紫點痰有辛氣唇有皺紋此非寒證所有以蕎麥麵團圈擦前後心有毛果即此證也譬諸人事言多者必假一語者反真審之醫理證象少者為真多者為假人身四肢為諸陽之本頭為六陽之首又臟不和則九竅不通陽氣不能運動即現諸般寒象若陽氣宣通其寒自散矣此病之形證有一二生機不可不救方用黃連解毒湯加大黃繼以理脾和肝羊毛溫邪尖似雜證如胄痛脅痛腹痛傷風停食積聚冷痰嘔吐等證病證甚多難以枚舉或間何以別之答曰易識其證面青胸脹舌有點紋脈象有力為準宜從羊毛溫治不宜從雜病治羊毛溫類證治羊毛溫邪重證用加減雙解散一日兩服若病劇不解者當半日中盡二服羊毛溫邪面現青色舌有點紋寒熱胸悶周身拘板頭眩作痛是此證也如舌現點紋寒熱胸悶身酸作痛面色不青非此證也蓋溫邪病羊毛病各從其證調之亦不拘於溫證羊毛證之方要知合宜而用羊毛溫邪四時發作夾表邪者宜先服荊防敗毒散次服加減雙解散得汗得利為愈羊毛溫邪表裡熱盛或發癍疹或頭而腮腫宜用加減普濟消毒飲兼服五黃羊毛溫邪病作不識昏悶狂躁忽寒忽熱延至四五日或十餘日用蕎麥麵團圈擦擦出毛有五色其毛甚健治法用黃連解毒湯加大黃石膏蒲公英防風雄黃黃蜜羊毛溫證伏邪發動煩躁發熱惡寒頭痛面色青滯舌赤苔黃浮黑有刺口渴神昏診脈右手數實左手關尺空虛此係肝腎素虧溫毒極重病急不可緩治亦不宜補陰托邪此證屢次經見速用加減雙解散逐去毒火外除羊毛保全氣血不致火灼陰陽內陷變證若畏涼攻則無濟矣羊毛溫邪伏毒發動寒熱痰血面青色滯舌有點紋或素有血證當此毒火內蒸其血必然漸湧脈象洪數以溫邪為主治法外除羊毛內服加減雙解散次以清熱解毒和肝養血調理羊毛溫邪毒火發動面色青滯舌有點紋忽作寒熱煩躁內燒便血不止或素有便血脈象數大以溫邪為主治法外除羊毛內服加減雙解散次以黃連解毒湯加白芍地榆銀花苡仁而愈羊毛溫邪痹痛十餘日忽寒忽熱自腹痛至腿足又至肩背晝夜不安醫以桂枝杜仲牛膝秦艽等藥不效更加煩躁病象甚危面色青板舌有紫點身痛難以轉側脈象數實治法外除羊毛內服黃連解毒湯加蟬衣殭蠶石膏煎汁加雄黃熟大黃黃蜜和服數劑而愈羊毛溫邪雙注單注證誤服溫燥藥如霍香厚朴烏藥木香等藥至毒火傷其氣血病加沈重宜用黃連解毒湯白虎湯加黃蜜雄黃和服氣弱者不易收功如本質氣壯者仍服加減雙解散而愈羊毛溫邪發動毒火面色青滯舌尖紫赤寒熱胸悶口眼歪斜不語肢廢人事昏沈類似中風病情診脈忽沈數而伏忽洪大而實脈證不應非中風也以溫邪法治外除羊毛用瓜蒂散探吐次服加減雙解散五黃丹吐瀉宣通為要並服紫雪金丹珠黃散若服藥後溫