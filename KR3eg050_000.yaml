front:
  text: 方序余家世業醫而余不知醫且並不識藥俗幼時羸而善病每喜與醫土遊蓋醫乃仁術業斯藝者類能以仁宅心餘語需金陵六載所識醫土如王式昭徐景伯隨萬寧周碩園皆長於方脈濮韞良長於外科汪藕塘長於按摩之數君子者律身行已必信必果又存心濟人利物鄉里僉稱為善人凡道路橋梁之傾圯不便於行人及祠宇報賽廢墜者不惜積資以成善舉殆紙不勝書癸丑冬余感風寒之疾四肢痛不可忍晝夜呼號輾轉床蓐瀕死者數矣式昭景伯以藥起之因式昭景伯得識萬寧萬寧偉軀幹亭亭如雞群之鶴時有塵埃外想與之談穆如藹如不覺矜躁之俱釋也茲萬寧以所著書問敘於余余閲其自敘之辭及循名療治之法殆發前人所未發而又明白簡要一覽無遺余雖不知醫而萬寧利濟婆心於斯方見昔賢謂不為良相即為良醫萬寧覃精殫思祖軒岐宗倉越法劉張朱李亦既盞年所矣而更參以已見集成是書可為烹魚之釜鬻濟川之舟楫異日隔垣早見望色先知深造正無窮期也萬寧勉乎哉嘉慶元年丙辰臘月吉旦整飭江南通省鹽法分巡江寧兼管水利道前刑部耶中律例館纂修官濟南方昂書於江寧巡署之靜遠堂王序余交隨君萬寧有年矣每與談峻黃家說知其淵源有本不與尋常術士比心竊敬之夫醫之為道奧妙無窮非深究靈樞素問之旨而加之以神悟不能得其會通世之業此者率泛涉本草歌訣便爾懸壺暨乎心不應手或至僨事絶不自省而返求其理故雖三折肱九折臂終未為良也隨君殊於是宜其學益精而全活者衆是不以術視醫而以道視醫故能如是近日撰羊毛溫證論一編出而問世實闡前人所未盡發而綢繹其旨其有功於先哲施及於後世者大矣遠矣證治原委己詳自敘余何庸更贊一言姑贅數語以志欽佩云爾隨君秉善於詩談醫之餘間出其吟詠以相訂正則余有互相稗益者余將序而傳之以見其餘事作詩人昔范文正公比良醫於良相今我隨君不又於杏林中增一佳話也哉嘉慶元年中元日菊莊陳序余素不知醫亦不習方藥嘗讀周禮一書言醫者至詳有掌其政令著有分而治之者蓋職有專司能有獨擅也聚藥以供醫事而渾名曰毒宇宙大和鮮大災沴其以危困而請於醫府者氣有不和也須以偏勝之物攻之當則止疾否則必傷慎之曰毒不亦宜乎其有不愈之狀則各書所以入於醫師非獨籍以制其食誠以醫不能無失且為後鑑也然則方藥之有書也殆周官法戒之遺意歟吾鄉隨萬寧先生誠篤溫厚與好善鄉里咸推重焉秋七月餘以給假南旋適從弟婦以危證得先生雙解方藥而愈因出近所著羊毛溫證論問敘於余夫溫疫者古方也羊毛疔者御纂金鑑中所備載也會通其意而名為羊毛證者隨氏之心解獨得也善說詩者不以文害辭不以辭害意以意逆志是為得之隨氏之書意以逆之耶刊以問世不敢自私又以知其良工心苦而虛且公也雖然余竊為著書者有二難焉才高者堅持門戶之見專以博辨攻詆為長安知不有以二書不能合此證古所無為隨氏咎乎然隨氏固巳明言其以意會通矣又何用嘵嘵者為質下者篤信而不善學之凡遇一證輒云羊毛溫證針以挑之面以擦之妄引隨氏法以自衛此又隨氏不及料而實為此書之罪人也惟證宜雙解者即以雙解法行之方證相對胸無成見藥用當而通神斯古法賴以不泯而隨氏之苦心庶幾與之俱傳乎此書中難發之隱不獨為著書者補之且為讀書者告之兼以質之吾鄉以醫名世諸君子以為何如也是為序嘉慶元年秋八月既庭陳廷碩拜撰徐序氣失平而為疾奇症原多藥用當而通神良方最重唯症非經見愈徵麋眼之清斯方有必傳彌著婆心之苦金陵隨萬寧先生學本六經醫已三世久神脈息肱折於三尤諳時邪氣分其五近有溫證前未盛行今遇良醫確昭神效火蒸臟腑感歲氣於司天肺主皮毛郁膜間之毒縷尋常未識診誤即危解散不先救遲亦殆惟先生善參古法妙活靈機以走獺之奇通出蛇之變如扁鵲之攻腠理明且察於秋毫類秦和之辨陰陽治更分於歧路柔毛盡剝有目皆知仙指才臨無人不活未忍私為已有輯症成書還思善與人同匯方壽世蓋先生仁心為質名教夙敦負郭本無獨重春秋之祀先生原寒士集會五百金買盤槐田四十餘畝每年租利為春秋祭祀用趨庖久有常循詩禮之針已天性之群推君陳孝友尢路人之共戴司馬陰功範步袍憐給軍寒而何既周郎困借拯貧餒以良多而且弄月吟風無非天趣宜其調梅種杏盡是春風昌素不知醫嘗欽抱道睹得心而應手實相雙解之功數起死而回生豈止一毛之利郭玉之醫以意效即丹方巫彭之藥有經此尤龍祕質之同方同術莫疑抱朴之增可知有經有言足禰靈樞之闕乾隆六十年乙卯冬自序瘟疫一證自古有然即周禮所謂四時癘疾也其所感之氣變幻難以言狀而靈樞素問及各名家並未立瘟疫之名逮吳又可始著方論吾鄉戴麟郊先生又著廣瘟疫論有辨氣辨色辨脈辨舌辨神之說足為後學津梁者更加詳備已但瘟疫中有半毛一種則從未有言之者歲辛卯此證頗行俗呼為羊毛疹子臨證頗難措手霖恭讀御纂醫宗金鑑外科疔瘡內載有羊毛疔證治之之法除毛有方用藥有則顯立成規遂會通其意格以所感之氣所入之門所出之處及其病作之形巽心推究酌方療治多獲生全越今多載欲以鄙見質諸同志因作羊毛溫證論似可與吳戴相發明夫瘟疫之變在外證既可化毛而成疔毒在內證亦可化毛而伏皮膚其相形而得名者正可循名而立法雖此證不多見而近年亦往往有之恐窮鄉僻壤突遇此證療治失宜貽誤匪淺謹將治而得效方藥一一志之然醫理淵微不免掛漏仍祈高明再加搏採補所未備未必非醫門之一助云乾隆六十年歲在乙卯冬十月上元隨霖萬寧甫識
